  <script>
    Recv.init_ww(4);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./recv-sw.js?v=20260706-170341-androidauto1');
    }

    var video = document.querySelector('#video');
    var receiverRuntimeReady = false;
    var receiverCameraAttempted = false;

    function prepareReceiverVideo() {
      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
    }

    function startReceiverCamera(force) {
      prepareReceiverVideo();
      if (!receiverRuntimeReady) {
        return false;
      }
      if (video.srcObject) {
        var playPromise = video.play();
        if (playPromise && playPromise.catch) {
          playPromise.catch(function () {});
        }
        return true;
      }
      if (receiverCameraAttempted && !force) {
        return false;
      }
      receiverCameraAttempted = true;
      Recv.init_video(video);
      return true;
    }

    window.ZheDianKuaiChuanStartCamera = startReceiverCamera;

    var Module = {};
    Module.onRuntimeInitialized = () => {
      receiverRuntimeReady = true;
      startReceiverCamera(false);
    };
  </script>
